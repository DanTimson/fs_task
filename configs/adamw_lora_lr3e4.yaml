experiment:
  name: "adamw_lora"
  output_dir: "outputs/adamw_lora"
  log_dir: "logs"
  seed: 42

model:
  name: "Qwen/Qwen2.5-0.5B"
  dtype: "bfloat16"

lora:
  r: 8
  alpha: 16
  dropout: 0.1
  target_modules: ["q_proj", "v_proj"]

data:
  dataset_name: "Elriggs/openwebtext-100k"
  text_column: "text"
  train_fraction: 0.01
  max_seq_len: 1024
  micro_batch_size: 4
  grad_accum_steps: 1
  num_workers: 4
  max_samples: 4000

training:
  epochs: 1
  lr: 3.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  log_every: 10
  save_every: 200

optimizer:
  name: "adamw"

output:
  eval_file: "eval_results.json"
